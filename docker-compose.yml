services:
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus-petclinic
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:9.1.7
    container_name: grafana-petclinic
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
    grafana-data:
